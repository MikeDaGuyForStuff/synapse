version: '3.8'

services:
  synapse-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8742:8742"
    environment:
      - SYNAPSE_DB_PATH=/data/synapse.db
    volumes:
      - synapse_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8742/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  synapse-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8742
    depends_on:
      synapse-api:
        condition: service_healthy
    restart: unless-stopped

  synapse-demo:
    build:
      context: ./demo
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      synapse-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  synapse_data: